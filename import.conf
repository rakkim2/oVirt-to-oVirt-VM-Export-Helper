# Shared defaults for oVirt-to-oVirt export scripts.
# Override at runtime:
#   VAR=value bash script.sh ...
# or:
#   CONFIG_FILE=/path/to/another.conf bash script.sh ...
#
# Manual execution order (one line each):
# 1) bash make_v2v_xml.sh <VM_NAME>
# 2) bash toggle_lv_from_xml.sh /data/v2v/xml/<VM_NAME>.xml up
# 3) bash convert_disks_from_xml.sh /data/v2v/xml/<VM_NAME>.xml
# 4) bash make_ovirt_ova.sh /data/v2v/xml/<VM_NAME>.xml
# 5) bash toggle_lv_from_xml.sh /data/v2v/xml/<VM_NAME>.xml down
#
# Full pipeline (auto):
# bash run_qemu_ova_pipeline.sh /data/v2v/xml/<VM_NAME>.xml

# Global options
: "${LIBVIRT_URI:=qemu:///system}"
: "${XML_OUT_DIR:=/data/v2v/xml}"
: "${RAW_BASE_DIR:=/data/v2v}"
: "${OVA_BASE_DIR:=/data/ova}"

# make_v2v_xml.sh
: "${USE_DEV_PATH:=1}"

# run_qemu_ova_pipeline.sh
: "${PIPELINE_LOG_ENABLE:=1}"

# toggle_lv_from_xml.sh
: "${UP_MODE:=ro}"
: "${SET_PERM_ON_ACTIVE_LV:=0}"

# convert_disks_from_xml.sh
: "${MAX_JOBS:=4}"
: "${INPUT_FORMAT:=raw}"
: "${OUTPUT_FORMAT:=qcow2}"
: "${OUTPUT_OPTIONS:=compat=1.1,lazy_refcounts=off,cluster_size=65536}"
: "${SPARSE_SIZE:=}"
: "${COROUTINES:=8}"
: "${CACHE_MODE:=writeback}"
: "${SRC_CACHE_MODE:=none}"

# make_ovirt_ova.sh
: "${ENGINE_VSYSTEM_TYPE:=ENGINE 4.1.0.0}"
: "${GENERATE_MANIFEST:=0}"
: "${USE_TAR_SPARSE:=1}"
: "${TAR_PROGRESS_INTERVAL:=5}"
: "${FORCE_OVF_DISK_FORMAT_URI:=}"
: "${FORCE_OVF_VOLUME_FORMAT:=}"
: "${FORCE_OVF_VOLUME_TYPE:=}"
: "${FORCE_BOOT_DISK_INDEX:=}"
